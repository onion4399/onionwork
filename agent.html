<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能体管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #F5F5F5;
        }
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        /* 下拉动画 */
        .dropdown-enter {
            opacity: 0;
            transform: translateY(-8px);
        }
        .dropdown-enter-active {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.2s, transform 0.2s;
        }
        .dropdown-exit {
            opacity: 1;
            transform: translateY(0);
        }
        .dropdown-exit-active {
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.15s, transform 0.15s;
        }
    </style>
</head>
<body class="min-h-screen flex">
    <!-- 左侧导航栏 -->
    <aside class="w-16 bg-[#001529] flex flex-col items-center py-4 flex-shrink-0">
        <!-- 折叠按钮 -->
        <div class="mb-4 text-white cursor-pointer hover:opacity-80">
            <i class="fa fa-angle-double-right text-lg"></i>
        </div>

        <!-- Logo -->
        <div class="mb-6 text-white font-bold text-lg">360</div>

        <!-- 导航图标 -->
        <nav class="flex-1 flex flex-col items-center space-y-2">
            <div class="w-10 h-10 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 rounded cursor-pointer transition-colors">
                <i class="fa fa-home text-lg"></i>
            </div>
            <div class="w-10 h-10 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 rounded cursor-pointer transition-colors">
                <i class="fa fa-history text-lg"></i>
            </div>
            <div class="w-10 h-10 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 rounded cursor-pointer transition-colors">
                <i class="fa fa-book text-lg"></i>
            </div>
            <div class="w-10 h-10 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 rounded cursor-pointer transition-colors">
                <i class="fa fa-cloud text-lg"></i>
            </div>
            <div class="w-10 h-10 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 rounded cursor-pointer transition-colors">
                <i class="fa fa-users text-lg"></i>
            </div>
            <div class="w-10 h-10 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 rounded cursor-pointer transition-colors">
                <i class="fa fa-cog text-lg"></i>
            </div>
            <div class="w-10 h-10 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 rounded cursor-pointer transition-colors">
                <i class="fa fa-calendar text-lg"></i>
            </div>
            <div class="w-10 h-10 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 rounded cursor-pointer transition-colors">
                <i class="fa fa-shield text-lg"></i>
            </div>
            <div class="w-10 h-10 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 rounded cursor-pointer transition-colors">
                <i class="fa fa-magic text-lg"></i>
            </div>
            <div class="w-10 h-10 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 rounded cursor-pointer transition-colors">
                <i class="fa fa-comment text-lg"></i>
            </div>
            <div class="w-10 h-10 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 rounded cursor-pointer transition-colors">
                <i class="fa fa-th text-lg"></i>
            </div>
            <div class="w-10 h-10 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 rounded cursor-pointer transition-colors">
                <i class="fa fa-comments text-lg"></i>
            </div>
        </nav>

        <!-- 底部新建按钮 -->
        <div class="mt-auto">
            <div class="w-10 h-10 flex items-center justify-center text-white bg-[#1677FF] rounded-full cursor-pointer hover:bg-[#4096FF] transition-colors shadow-lg">
                <i class="fa fa-plus text-lg"></i>
            </div>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="flex-1 flex flex-col min-h-screen">
        <!-- 顶部导航 -->
        <header class="bg-white border-b border-gray-200 flex justify-center">
            <nav class="flex space-x-8">
                <div class="px-4 py-4 text-[#1677FF] font-medium border-b-2 border-[#1677FF] cursor-pointer">
                    列表
                </div>
                <div class="px-4 py-4 text-[#8C8C8C] hover:text-[#262626] cursor-pointer transition-colors">
                    配置
                </div>
                <div class="px-4 py-4 text-[#8C8C8C] hover:text-[#262626] cursor-pointer transition-colors">
                    统计
                </div>
                <div class="px-4 py-4 text-[#8C8C8C] hover:text-[#262626] cursor-pointer transition-colors">
                    商店
                </div>
            </nav>
        </header>

        <!-- 内容区 -->
        <div class="flex-1 p-6">
            <div class="max-w-[1400px] mx-auto">
                <!-- 子Tab切换 -->
                <div class="flex space-x-6 mb-6 border-b border-gray-200">
                    <div class="pb-3 text-[#1677FF] font-medium border-b-2 border-[#1677FF] cursor-pointer">
                        标准版
                    </div>
                    <div class="pb-3 text-[#8C8C8C] hover:text-[#262626] cursor-pointer transition-colors">
                        高级版
                    </div>
                </div>

                <!-- 操作栏 -->
                <div class="flex items-center justify-between mb-4">
                    <!-- 左侧：标题 -->
                    <div class="text-[#8C8C8C] text-base font-medium">智能体</div>

                    <!-- 右侧：筛选组件组 -->
                    <div class="flex items-center space-x-3">
                        <!-- 搜索框 -->
                        <div class="relative">
                            <div class="flex items-center w-[220px] h-8 bg-white border border-[#D9D9D9] rounded-md overflow-hidden transition-all duration-200" id="searchBox">
                                <div class="flex items-center justify-center w-8 h-full">
                                    <i class="fa fa-search text-[#8C8C8C] text-sm"></i>
                                </div>
                                <input
                                    type="text"
                                    id="searchInput"
                                    placeholder="搜索智能体名称"
                                    class="flex-1 h-full px-0 text-xs text-[#262626] placeholder-[#8C8C8C] outline-none border-none"
                                >
                                <div class="flex items-center justify-center w-8 h-full cursor-pointer opacity-0 transition-opacity" id="clearSearchBtn">
                                    <i class="fa fa-times-circle text-[#8C8C8C] text-sm hover:text-[#262626]"></i>
                                </div>
                            </div>
                        </div>

                        <!-- 我创建的 Toggle -->
                        <button
                            id="myCreatedBtn"
                            class="flex items-center justify-center h-8 px-3 bg-white border border-[#D9D9D9] rounded-md transition-all duration-200 hover:border-[#BFBFBF]"
                        >
                            <i class="fa fa-user text-xs mr-1.5 text-[#8C8C8C] transition-colors" id="myCreatedIcon"></i>
                            <span class="text-xs text-[#8C8C8C] transition-colors" id="myCreatedText">我创建的</span>
                        </button>

                        <!-- 状态下拉 -->
                        <div class="relative" id="statusDropdownContainer">
                            <button
                                id="statusBtn"
                                class="flex items-center justify-between h-8 px-3 bg-white border border-[#D9D9D9] rounded-md min-w-[100px] transition-all duration-200 hover:border-[#BFBFBF]"
                            >
                                <span class="text-xs text-[#262626] mr-2" id="statusText">状态</span>
                                <i class="fa fa-chevron-down text-[#8C8C8C] text-xs transition-transform" id="statusArrow"></i>
                            </button>
                            <!-- 下拉菜单 -->
                            <div class="hidden absolute top-full left-0 mt-1 w-32 bg-white border border-[#D9D9D9] rounded-md shadow-lg z-50 overflow-hidden" id="statusDropdown">
                                <div class="py-1">
                                    <div class="px-3 py-2 text-xs text-[#262626] hover:bg-[#F5F5F5] cursor-pointer transition-colors status-option" data-value="all">全部状态</div>
                                    <div class="px-3 py-2 text-xs text-[#262626] hover:bg-[#F5F5F5] cursor-pointer transition-colors status-option" data-value="active">运行中</div>
                                    <div class="px-3 py-2 text-xs text-[#262626] hover:bg-[#F5F5F5] cursor-pointer transition-colors status-option" data-value="inactive">已停用</div>
                                    <div class="px-3 py-2 text-xs text-[#262626] hover:bg-[#F5F5F5] cursor-pointer transition-colors status-option" data-value="archived">已归档</div>
                                </div>
                            </div>
                        </div>

                        <!-- 创建按钮 -->
                        <button class="flex items-center h-8 px-4 bg-[#1677FF] text-white text-xs font-medium rounded-md hover:bg-[#4096FF] transition-colors">
                            <i class="fa fa-plus mr-1.5"></i>
                            创建智能体
                        </button>
                    </div>
                </div>

                <!-- 筛选结果提示行 -->
                <div class="hidden h-7 mb-4 flex items-center justify-between" id="filterHint">
                    <div class="text-xs text-[#8C8C8C]">
                        共找到 <span id="resultCount" class="font-medium text-[#262626]">0</span> 个智能体
                    </div>
                    <div class="flex items-center space-x-1.5" id="filterTags">
                        <!-- 动态生成的标签 -->
                    </div>
                </div>

                <!-- 智能体卡片网格 -->
                <div class="grid grid-cols-4 gap-4" id="agentGrid">
                    <!-- 卡片将通过JS动态渲染 -->
                </div>

                <!-- 空状态 -->
                <div class="hidden py-20" id="emptyState">
                    <div class="flex flex-col items-center justify-center">
                        <div class="w-20 h-20 mb-4 flex items-center justify-center">
                            <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                                <circle cx="28" cy="28" r="18" stroke="#D9D9D9" stroke-width="2"/>
                                <path d="M40 40L52 52" stroke="#D9D9D9" stroke-width="2" stroke-linecap="round"/>
                                <circle cx="28" cy="28" r="8" stroke="#D9D9D9" stroke-width="2"/>
                            </svg>
                        </div>
                        <div class="text-sm text-[#8C8C8C] mb-3" id="emptyText">未找到相关智能体</div>
                        <button class="text-sm text-[#1677FF] hover:underline" id="clearAllFilters">清除搜索</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 智能体数据
        const agentsData = [
            { id: 1, name: '城轨造价助手', description: '城轨造价小助手，专注城市轨道交通工程造价管理', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=1', status: 'active', isMine: false, hasBadge: false },
            { id: 2, name: 'AI智能仿写', description: '基于文件AI的内容、参考文件的结构...', avatar: 'https://api.dicebear.com/7.x/bottts/svg?seed=2', status: 'active', isMine: true, hasBadge: true, badgeText: '待发布' },
            { id: 3, name: '市场营销助理', description: '市场营销小助手，助您精准定位市场', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=3', status: 'active', isMine: false, hasBadge: false },
            { id: 4, name: '顾客用户服务', description: '我是用户服务小助手，专为您解答疑...', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=4', status: 'active', isMine: true, hasBadge: false },
            { id: 5, name: '顾家AI云盾', description: '智能云盾AI助手，提供网络安全预警...', avatar: 'https://api.dicebear.com/7.x/bottts/svg?seed=5', status: 'active', isMine: false, hasBadge: false },
            { id: 6, name: '顾学研习社', description: 'AI驱动的员工成长助手，定制家旅行...', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=6', status: 'active', isMine: true, hasBadge: false },
            { id: 7, name: '顾销智策', description: '全域营销智策引擎，整合线上线下渠...', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=7', status: 'inactive', isMine: false, hasBadge: false },
            { id: 8, name: '顾享贴心', description: '全渠道智能客服，支持语音/图像识别...', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=8', status: 'active', isMine: true, hasBadge: false },
            { id: 9, name: '顾家小暖', description: '情感化AI陪伴助手，记录用户家庭纪...', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=9', status: 'active', isMine: false, hasBadge: false },
            { id: 10, name: '顾维保通', description: '产品生命周期管家，主动提醒家具保...', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=10', status: 'archived', isMine: true, hasBadge: false },
            { id: 11, name: '顾家先锋', description: '实时监测竞品动态，从新品发布、定...', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=11', status: 'active', isMine: false, hasBadge: false },
            { id: 12, name: '职通车', description: '职业路径规划助手，分析就业市场趋...', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=12', status: 'active', isMine: true, hasBadge: false },
            { id: 13, name: '对标镜', description: 'AI驱动的SWOT分析专家，对比行业...', avatar: 'https://api.dicebear.com/7.x/bottts/svg?seed=13', status: 'inactive', isMine: false, hasBadge: false },
            { id: 14, name: '运维管家', description: '专注于企业IT基础设施监控与故障预...', avatar: 'https://api.dicebear.com/7.x/bottts/svg?seed=14', status: 'active', isMine: true, hasBadge: false },
            { id: 15, name: '顾家实训师', description: '通过VR/AR模拟真实工作场景的培训...', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=15', status: 'active', isMine: false, hasBadge: false },
            { id: 16, name: '文案魔术师', description: '自动生成高转化广告文案的智能体...', avatar: 'https://api.dicebear.com/7.x/bottts/svg?seed=16', status: 'active', isMine: true, hasBadge: false }
        ];

        // 状态管理
        const state = {
            searchTerm: '',
            showOnlyMyCreated: false,
            statusFilter: 'all'
        };

        // 状态标签映射
        const statusLabels = {
            'all': '状态',
            'active': '运行中',
            'inactive': '已停用',
            'archived': '已归档'
        };

        // DOM 元素
        const searchBox = document.getElementById('searchBox');
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const myCreatedBtn = document.getElementById('myCreatedBtn');
        const myCreatedIcon = document.getElementById('myCreatedIcon');
        const myCreatedText = document.getElementById('myCreatedText');
        const statusBtn = document.getElementById('statusBtn');
        const statusText = document.getElementById('statusText');
        const statusArrow = document.getElementById('statusArrow');
        const statusDropdown = document.getElementById('statusDropdown');
        const agentGrid = document.getElementById('agentGrid');
        const emptyState = document.getElementById('emptyState');
        const emptyText = document.getElementById('emptyText');
        const filterHint = document.getElementById('filterHint');
        const resultCount = document.getElementById('resultCount');
        const filterTags = document.getElementById('filterTags');
        const clearAllFilters = document.getElementById('clearAllFilters');

        // 初始化
        function init() {
            renderAgents(agentsData);
            bindEvents();
        }

        // 绑定事件
        function bindEvents() {
            // 搜索框事件
            searchInput.addEventListener('input', (e) => {
                state.searchTerm = e.target.value.trim();
                updateSearchUI();
                applyFilters();
            });

            searchInput.addEventListener('focus', () => {
                searchBox.style.borderColor = '#1677FF';
            });

            searchInput.addEventListener('blur', () => {
                if (!state.searchTerm) {
                    searchBox.style.borderColor = '#D9D9D9';
                }
            });

            // 清除搜索按钮
            clearSearchBtn.addEventListener('click', () => {
                state.searchTerm = '';
                searchInput.value = '';
                updateSearchUI();
                applyFilters();
                searchInput.focus();
            });

            // 我创建的 Toggle
            myCreatedBtn.addEventListener('click', () => {
                state.showOnlyMyCreated = !state.showOnlyMyCreated;
                updateMyCreatedUI();
                applyFilters();
            });

            // 状态下拉
            statusBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleStatusDropdown();
            });

            // 状态选项点击
            document.querySelectorAll('.status-option').forEach(option => {
                option.addEventListener('click', (e) => {
                    e.stopPropagation();
                    state.statusFilter = e.target.dataset.value;
                    statusText.textContent = statusLabels[state.statusFilter];
                    hideStatusDropdown();
                    applyFilters();
                });
            });

            // 点击外部关闭下拉
            document.addEventListener('click', () => {
                hideStatusDropdown();
            });

            // 清除所有筛选
            clearAllFilters.addEventListener('click', () => {
                clearAll();
            });
        }

        // 更新搜索框UI
        function updateSearchUI() {
            if (state.searchTerm) {
                clearSearchBtn.classList.remove('opacity-0');
                searchBox.style.borderColor = '#1677FF';
            } else {
                clearSearchBtn.classList.add('opacity-0');
                searchBox.style.borderColor = '#D9D9D9';
            }
        }

        // 更新"我创建的"UI
        function updateMyCreatedUI() {
            if (state.showOnlyMyCreated) {
                myCreatedBtn.classList.remove('bg-white', 'border-[#D9D9D9]');
                myCreatedBtn.classList.add('bg-[#E6F4FF]', 'border-[#1677FF]');
                myCreatedIcon.classList.remove('text-[#8C8C8C]');
                myCreatedIcon.classList.add('text-[#1677FF]');
                myCreatedText.classList.remove('text-[#8C8C8C]');
                myCreatedText.classList.add('text-[#1677FF]');
            } else {
                myCreatedBtn.classList.add('bg-white', 'border-[#D9D9D9]');
                myCreatedBtn.classList.remove('bg-[#E6F4FF]', 'border-[#1677FF]');
                myCreatedIcon.classList.add('text-[#8C8C8C]');
                myCreatedIcon.classList.remove('text-[#1677FF]');
                myCreatedText.classList.add('text-[#8C8C8C]');
                myCreatedText.classList.remove('text-[#1677FF]');
            }
        }

        // 切换状态下拉
        function toggleStatusDropdown() {
            const isHidden = statusDropdown.classList.contains('hidden');
            if (isHidden) {
                statusDropdown.classList.remove('hidden');
                statusArrow.classList.add('rotate-180');
            } else {
                hideStatusDropdown();
            }
        }

        // 隐藏状态下拉
        function hideStatusDropdown() {
            statusDropdown.classList.add('hidden');
            statusArrow.classList.remove('rotate-180');
        }

        // 应用筛选
        function applyFilters() {
            const filtered = agentsData.filter(agent => {
                // 搜索条件
                const matchesSearch = !state.searchTerm ||
                    agent.name.toLowerCase().includes(state.searchTerm.toLowerCase());

                // 我创建的条件
                const matchesMyCreated = !state.showOnlyMyCreated || agent.isMine;

                // 状态条件
                const matchesStatus = state.statusFilter === 'all' || agent.status === state.statusFilter;

                // 取交集
                return matchesSearch && matchesMyCreated && matchesStatus;
            });

            renderAgents(filtered);
            updateFilterHint(filtered.length);
        }

        // 更新筛选提示
        function updateFilterHint(count) {
            const hasActiveFilter = state.searchTerm || state.showOnlyMyCreated || state.statusFilter !== 'all';

            if (hasActiveFilter) {
                filterHint.classList.remove('hidden');
                resultCount.textContent = count;

                // 生成标签
                const tags = [];

                if (state.searchTerm) {
                    tags.push({
                        type: 'search',
                        text: `搜索：${state.searchTerm}`,
                        onRemove: () => {
                            state.searchTerm = '';
                            searchInput.value = '';
                            updateSearchUI();
                            applyFilters();
                        }
                    });
                }

                if (state.showOnlyMyCreated) {
                    tags.push({
                        type: 'myCreated',
                        text: '我创建的',
                        onRemove: () => {
                            state.showOnlyMyCreated = false;
                            updateMyCreatedUI();
                            applyFilters();
                        }
                    });
                }

                if (state.statusFilter !== 'all') {
                    tags.push({
                        type: 'status',
                        text: statusLabels[state.statusFilter],
                        onRemove: () => {
                            state.statusFilter = 'all';
                            statusText.textContent = statusLabels['all'];
                            applyFilters();
                        }
                    });
                }

                filterTags.innerHTML = tags.map(tag => `
                    <div class="flex items-center px-2 py-1 bg-[#E6F4FF] rounded text-xs text-[#1677FF]">
                        <span>${tag.text}</span>
                        <i class="fa fa-times ml-1.5 cursor-pointer hover:text-[#262626] transition-colors" data-type="${tag.type}"></i>
                    </div>
                `).join('');

                // 绑定标签删除事件
                filterTags.querySelectorAll('.fa-times').forEach((btn, index) => {
                    btn.addEventListener('click', tags[index].onRemove);
                });
            } else {
                filterHint.classList.add('hidden');
            }

            // 更新空状态文字
            if (state.searchTerm) {
                emptyText.textContent = `未找到「${state.searchTerm}」相关智能体`;
            } else {
                emptyText.textContent = '未找到相关智能体';
            }
        }

        // 清除所有筛选
        function clearAll() {
            state.searchTerm = '';
            state.showOnlyMyCreated = false;
            state.statusFilter = 'all';

            searchInput.value = '';
            updateSearchUI();
            updateMyCreatedUI();
            statusText.textContent = statusLabels['all'];

            applyFilters();
        }

        // 渲染智能体卡片
        function renderAgents(agents) {
            if (agents.length === 0) {
                agentGrid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            agentGrid.classList.remove('hidden');
            emptyState.classList.add('hidden');

            agentGrid.innerHTML = agents.map(agent => `
                <div class="bg-white border border-[#E8E8E8] rounded-lg p-4 hover:shadow-md transition-shadow relative">
                    ${agent.hasBadge ? `
                        <div class="absolute top-0 right-0 bg-[#FF7A45] text-white text-[10px] px-2 py-0.5 rounded-bl-lg rounded-tr-lg">
                            ${agent.badgeText}
                        </div>
                    ` : ''}
                    <div class="flex items-start mb-3">
                        <img src="${agent.avatar}" alt="${agent.name}" class="w-[60px] h-[60px] rounded-lg object-cover mr-3 flex-shrink-0">
                        <div class="flex-1 min-w-0">
                            <h3 class="text-[#262626] font-semibold text-base mb-1 truncate">${agent.name}</h3>
                            <p class="text-[#8C8C8C] text-xs line-clamp-2 leading-relaxed">${agent.description}</p>
                        </div>
                    </div>
                    <div class="flex items-center justify-between pt-2 border-t border-[#F0F0F0]">
                        <div class="flex items-center space-x-3">
                            <button class="text-[#8C8C8C] hover:text-[#1677FF] transition-colors" title="设置">
                                <i class="fa fa-cog"></i>
                            </button>
                            <button class="text-[#8C8C8C] hover:text-[#1677FF] transition-colors" title="复制">
                                <i class="fa fa-copy"></i>
                            </button>
                            <button class="text-[#8C8C8C] hover:text-[#1677FF] transition-colors" title="分享">
                                <i class="fa fa-share"></i>
                            </button>
                            <button class="text-[#8C8C8C] hover:text-[#1677FF] transition-colors" title="更多">
                                <i class="fa fa-ellipsis-h"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 启动
        init();
    </script>
</body>
</html>
